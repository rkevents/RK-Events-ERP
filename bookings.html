<div class="container-fluid">

    <!-- Back to Dashboard -->

    <div class="mb-3">
        <button 
            class="btn btn-outline-secondary btn-sm"
            onclick="navigateToDashboard()">
            <i class="bi bi-arrow-left me-2"></i>
            Back to Dashboard
        </button>
    </div>

    <!-- Page Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold mb-1">

                Booking Management

            </h2>

            <p class="text-muted mb-0">

                Create, Manage and Track all Event Bookings

            </p>

        </div>

        <button
            class="btn btn-primary"
            onclick="openBookingForm()">

            <i class="bi bi-plus-circle me-2"></i>

            New Booking

        </button>

    </div>

    <!-- Filter Card -->

    <div class="card shadow-sm border-0 mb-3">

        <div class="card-body">

            <!-- Date Range Filter -->
            <div class="row g-3 mb-3 align-items-end">
                
                <div class="col-lg-2 col-md-3 col-sm-6">
                    <label class="form-label small text-muted mb-1">
                        <i class="bi bi-calendar3"></i> From Date
                    </label>
                    <input
                        type="date"
                        id="filterFromDate"
                        class="form-control form-control-sm">
                </div>

                <div class="col-lg-2 col-md-3 col-sm-6">
                    <label class="form-label small text-muted mb-1">
                        <i class="bi bi-calendar3"></i> To Date
                    </label>
                    <input
                        type="date"
                        id="filterToDate"
                        class="form-control form-control-sm">
                </div>

                <div class="col-lg-3 col-md-3 col-sm-6 d-flex gap-2">
                    <button
                        class="btn btn-primary btn-sm"
                        onclick="applyDateFilter()">
                        <i class="bi bi-search"></i> Search
                    </button>
                    <button
                        class="btn btn-outline-secondary btn-sm"
                        onclick="clearAllFilters()">
                        <i class="bi bi-x-circle"></i> Clear
                    </button>
                </div>

            </div>

            <!-- Text Search -->
            <div class="row g-3">

                <div class="col-lg-6">

                    <input
                        type="text"
                        id="bookingSearch"
                        class="form-control form-control-sm"
                        placeholder="🔍 Search by Booking No / Customer / Mobile"
                        onkeyup="applyFilters()">

                </div>

                <div class="col-lg-6 text-end">

                    <button
                        class="btn btn-outline-primary btn-sm"
                        onclick="loadBookings()">

                        <i class="bi bi-arrow-clockwise"></i>

                        Refresh

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Active Filter Badge -->
    <div id="activeFilterBadge" class="filter-badge-container" style="display: none;">
        <div class="filter-badge">
            <span class="filter-badge-label">Showing:</span>
            <span id="filterBadgeText" class="filter-badge-text">All Bookings</span>
            <button class="filter-badge-clear" onclick="clearAllFilters()">
                <i class="bi bi-x-circle"></i> Clear Filter
            </button>
        </div>
    </div>

    <!-- Booking Table -->

    <div class="card shadow-sm border-0">

        <div class="card-body p-0">

            <div class="table-responsive">

                <table class="table table-hover align-middle mb-0">

                    <thead class="table-light">

                        <tr>

                            <th style="width:120px">
                                Booking No
                            </th>

                            <th>
                                Customer
                            </th>

                            <th style="width:130px">
                                Mobile
                            </th>

                            <th style="width:140px">
                                Event
                            </th>

                            <th style="width:130px">
                                Event Date
                            </th>

                            <th style="width:120px">
                                Budget
                            </th>

                            <th style="width:120px">
                                Advance
                            </th>

                            <th style="width:120px">
                                Balance
                            </th>

                            <th style="width:140px">
                                Status
                            </th>

                            <th style="width:120px" class="text-center">
                                Action
                            </th>

                        </tr>

                    </thead>

                    <tbody id="bookingTable">

                        <tr>

                            <td colspan="10"
                                class="text-center text-muted py-5">

                                Loading bookings...

                            </td>

                        </tr>
                                            </tbody>

                    <tfoot class="table-light">

                        <tr>

                            <th colspan="10">

                                <div class="d-flex justify-content-between align-items-center">

                                    <span id="bookingCount">

                                        Total Bookings : 0

                                    </span>

                                    <small class="text-muted">

                                        RK Events ERP

                                    </small>

                                </div>

                            </th>

                        </tr>

                    </tfoot>

                </table>

            </div>

        </div>

    </div>

</div>
