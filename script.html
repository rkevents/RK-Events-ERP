<script>

/******************************************************
 * LOADER
 ******************************************************/
function showLoader() {

    const loader = document.getElementById("loader");

    if (loader) {
        loader.style.display = "flex";
    }

}

function hideLoader() {

    const loader = document.getElementById("loader");

    if (loader) {
        loader.style.display = "none";
    }

}

/******************************************************
 * TOAST
 ******************************************************/
function showToast(message, type = "success") {

    const container = document.getElementById("toastContainer");

    if (!container) return;

    const toast = document.createElement("div");

    toast.className =
        "toast align-items-center text-bg-" +
        type +
        " border-0";

    toast.innerHTML = `
        <div class="d-flex">

            <div class="toast-body">

                ${message}

            </div>

            <button
                type="button"
                class="btn-close btn-close-white me-2 m-auto"
                data-bs-dismiss="toast">
            </button>

        </div>
    `;

    container.appendChild(toast);

    const bsToast = new bootstrap.Toast(toast, {
        delay: 3000
    });

    bsToast.show();

    toast.addEventListener("hidden.bs.toast", function () {

        toast.remove();

    });

}

/******************************************************
 * GOOGLE APPS SCRIPT
 ******************************************************/
function callServer(functionName, ...params) {

    return new Promise((resolve, reject) => {

        showLoader();

        try {

            google.script.run

                .withSuccessHandler(function (result) {

                    hideLoader();

                    console.groupCollapsed(
                        "Apps Script : " + functionName
                    );

                    console.log("Function :", functionName);
                    console.log("Result   :", result);
                    console.log("Type     :", typeof result);

                    console.groupEnd();

                    if (result === null || result === undefined) {

                        reject({
                            success: false,
                            message:
                                functionName +
                                " returned NULL."
                        });

                        return;

                    }

                    resolve(result);

                })

                .withFailureHandler(function (error) {

                    hideLoader();

                    console.error(error);

                    showToast(
                        error.message ||
                        "Server Error",
                        "danger"
                    );

                    reject(error);

                })

                [functionName](...params);

        }
        catch (e) {

            hideLoader();

            console.error(e);

            reject(e);

        }

    });

}

/******************************************************
 * COMMON UTILITIES
 ******************************************************/
function setText(id, value) {

    const element =
        document.getElementById(id);

    if (element) {

        element.textContent =
            value ?? "";

    }

}

function safeValue(id) {

    const element =
        document.getElementById(id);

    if (!element)
        return "";

    return element.value.trim();

}

function safeNumber(id) {

    const value =
        Number(
            document.getElementById(id)?.value
        );

    return isNaN(value)
        ? 0
        : value;

}
/******************************************************
 * LOAD DASHBOARD
 ******************************************************/
async function loadDashboard() {

    try {

        const result =
            await callServer(
                "getDashboardSummary"
            );

        if (!result)
            return;

        setText(
            "totalCustomers",
            result.customers
        );

        setText(
            "totalBookings",
            result.bookings
        );

        setText(
            "totalPackages",
            result.packages
        );

        setText(
            "totalEmployees",
            result.employees
        );

        setText(
            "totalExpenses",
            result.expenses
        );

        setText(
            "companyName",
            result.company
        );

    }
    catch (e) {

        console.error(e);

    }

}

/******************************************************
 * LOAD USER SESSION
 ******************************************************/
async function loadSession() {

    try {

        const session =
            await callServer(
                "getSession"
            );

        if (!session.success) {

            showToast(
                session.message,
                "danger"
            );

            return;

        }

        setText(
            "loggedUser",
            session.data.name
        );

    }
    catch (e) {

        console.error(e);

    }

}

/******************************************************
 * PAGE NAVIGATION
 ******************************************************/
function showPage(pageId) {

    document
        .querySelectorAll(".app-page")
        .forEach(function (page) {

            page.style.display = "none";

        });

    const page =
        document.getElementById(pageId);

    if (page) {

        page.style.display = "block";

    }

}

/******************************************************
 * DASHBOARD
 ******************************************************/
function showDashboard() {

    showPage("dashboardPage");

    loadDashboard();

}

/******************************************************
 * BOOKINGS
 ******************************************************/
function showBookings() {

    showPage("bookingsPage");

    loadBookings();

}

/******************************************************
 * BOOKING MODAL
 ******************************************************/
let bookingModal = null;

function openBookingForm() {

    const modal =
        document.getElementById(
            "bookingModal"
        );

    if (!modal) {

        showToast(
            "Booking form not found.",
            "danger"
        );

        return;

    }

    bookingModal =
        bootstrap.Modal.getOrCreateInstance(
            modal
        );

    clearBookingForm();

    bookingModal.show();

}

function closeBookingForm() {

    if (bookingModal) {

        bookingModal.hide();

    }

}

/******************************************************
 * CLEAR BOOKING FORM
 ******************************************************/
function clearBookingForm() {

    [
        "customerName",
        "mobile",
        "alternateMobile",
        "eventDate",
        "eventTime",
        "venue",
        "requirement",
        "budget",
        "googleMap",
        "advanceAmount",
        "balanceAmount",
        "remarks"
    ].forEach(function (id) {

        const el =
            document.getElementById(id);

        if (el) {

            el.value = "";

        }

    });

    [
        "eventType",
        "paymentStatus",
        "bookingStatus"
    ].forEach(function (id) {

        const el =
            document.getElementById(id);

        if (el) {

            el.selectedIndex = 0;

        }

    });

}

/******************************************************
 * CALCULATE BALANCE
 ******************************************************/
function calculateBalance() {

    const budget =
        safeNumber("budget");

    const advance =
        safeNumber("advanceAmount");

    document.getElementById(
        "balanceAmount"
    ).value = budget - advance;

}
/******************************************************
 * SAVE BOOKING
 ******************************************************/
async function saveBooking() {

    const booking = {

        customerName: safeValue("customerName"),
        mobile: safeValue("mobile"),
        alternateMobile: safeValue("alternateMobile"),

        eventType:
            document.getElementById("eventType").value,

        eventDate:
            document.getElementById("eventDate").value,

        eventTime:
            document.getElementById("eventTime").value,

        venue: safeValue("venue"),
        requirement: safeValue("requirement"),
        budget: safeNumber("budget"),
        googleMap: safeValue("googleMap"),

        advanceAmount:
            safeNumber("advanceAmount"),

        balanceAmount:
            safeNumber("balanceAmount"),

        paymentStatus:
            document.getElementById("paymentStatus").value,

        bookingStatus:
            document.getElementById("bookingStatus").value,

        remarks: safeValue("remarks")

    };

    if (!booking.customerName)
        return showToast("Customer Name is required", "danger");

    if (!booking.mobile)
        return showToast("Mobile Number is required", "danger");

    if (!booking.eventType)
        return showToast("Event Type is required", "danger");

    if (!booking.eventDate)
        return showToast("Event Date is required", "danger");

    try {

        const result =
            await callServer(
                "saveBooking",
                booking
            );

        if (!result.success) {

            showToast(
                result.message,
                "danger"
            );

            return;

        }

        showToast(result.message);

        if (bookingModal) {

            bookingModal.hide();

        }

        await loadBookings();

        await loadDashboard();

    }
    catch (e) {

        console.error(e);

        showToast(
            e.message || "Unable to save booking.",
            "danger"
        );

    }

}

/******************************************************
 * LOAD BOOKINGS
 ******************************************************/
async function loadBookings() {

    try {

        const result =
            await callServer(
                "getBookingList"
            );

        console.log("Booking Response :", result);

        if (!result) {

            showToast(
                "No response from server.",
                "danger"
            );

            return;

        }

        if (!result.success) {

            showToast(
                result.message,
                "danger"
            );

            return;

        }

        renderBookingTable(
            result.data || []
        );

    }
    catch (e) {

        console.error(e);

        showToast(
            e.message || "Unable to load bookings.",
            "danger"
        );

    }

}

/******************************************************
 * RENDER BOOKING TABLE
 ******************************************************/
function renderBookingTable(bookings) {

    const tbody =
        document.getElementById("bookingTable");

    if (!tbody)
        return;

    tbody.innerHTML = "";

    if (!bookings || !Array.isArray(bookings) || !bookings.length) {

        tbody.innerHTML = `
        <tr>
            <td colspan="10"
                class="text-center text-muted">
                No Bookings Available
            </td>
        </tr>`;

        setText("bookingCount", "Total Bookings : 0");

        return;

    }

    bookings.forEach(function(item){

        tbody.innerHTML += `
        <tr>

            <td>${item.BookingNo || ""}</td>

            <td>${item.CustomerName || ""}</td>

            <td>${item.Mobile || ""}</td>

            <td>${item.EventType || ""}</td>

            <td>${item.EventDate || ""}</td>

            <td>₹ ${item.Budget || 0}</td>

            <td>₹ ${item.AdvanceAmount || 0}</td>

            <td>₹ ${item.BalanceAmount || 0}</td>

            <td>${item.BookingStatus || ""}</td>

            <td>

                <button
                    class="btn btn-sm btn-primary"
                    onclick="editBooking('${item.BookingID}')">

                    <i class="bi bi-pencil"></i>

                </button>

                <button
                    class="btn btn-sm btn-danger"
                    onclick="deleteBooking('${item.BookingID}')">

                    <i class="bi bi-trash"></i>

                </button>

            </td>

        </tr>`;

    });

    setText("bookingCount", "Total Bookings : " + bookings.length);

}

/******************************************************
 * SEARCH BOOKINGS
 ******************************************************/
function searchBookings() {

    const search =
        document.getElementById("bookingSearch");

    if (!search)
        return;

    const keyword =
        search.value
            .toLowerCase()
            .trim();

    document
        .querySelectorAll("#bookingTable tr")
        .forEach(function (row) {

            row.style.display =
                row.innerText
                    .toLowerCase()
                    .includes(keyword)
                    ? ""
                    : "none";

        });

}

/******************************************************
 * EDIT BOOKING
 ******************************************************/
async function editBooking(id) {

    try {

        const result =
            await callServer(
                "getBookingById",
                id
            );

        if (!result.success) {

            showToast(
                result.message,
                "danger"
            );

            return;

        }

        showToast(
            "Edit module will be completed in Sprint 2.",
            "warning"
        );

    }
    catch (e) {

        console.error(e);

    }

}

/******************************************************
 * DELETE BOOKING
 ******************************************************/
async function deleteBooking(id) {

    if (!confirm("Are you sure you want to delete this booking?")) {

        return;

    }

    try {

        showToast(
            "Delete module will be completed in Sprint 2.",
            "warning"
        );

    }
    catch (e) {

        console.error(e);

    }

}

/******************************************************
 * SIDEBAR ACTIVE MENU
 ******************************************************/
document.addEventListener("click", function (e) {

    const menu =
        e.target.closest(".menu-link");

    if (!menu)
        return;

    document
        .querySelectorAll(".menu-link")
        .forEach(function (link) {

            link.classList.remove("active");

        });

    menu.classList.add("active");

});

/******************************************************
 * APPLICATION STARTUP
 ******************************************************/
window.onload = async function () {

    console.log("RK EVENTS ERP v2.1 Started");

    try {

        await loadSession();

        await loadDashboard();

        showDashboard();

    }
    catch (e) {

        console.error(e);

        showToast(
            "Application startup failed.",
            "danger"
        );

    }

};

</script>
