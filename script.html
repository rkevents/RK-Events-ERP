<script>

/******************************************************
 * LOADER
 ******************************************************/
function showLoader() {

    const loader = document.getElementById("loader");

    if (loader) {
        loader.style.display = "flex";
    }

}

function hideLoader() {

    const loader = document.getElementById("loader");

    if (loader) {
        loader.style.display = "none";
    }

}

/******************************************************
 * TOAST
 ******************************************************/
function showToast(message, type = "success") {

    const container = document.getElementById("toastContainer");

    if (!container) return;

    const toast = document.createElement("div");

    toast.className =
        "toast align-items-center text-bg-" +
        type +
        " border-0";

    toast.innerHTML = `
        <div class="d-flex">

            <div class="toast-body">

                ${message}

            </div>

            <button
                type="button"
                class="btn-close btn-close-white me-2 m-auto"
                data-bs-dismiss="toast">
            </button>

        </div>
    `;

    container.appendChild(toast);

    const bsToast = new bootstrap.Toast(toast, {
        delay: 3000
    });

    bsToast.show();

    toast.addEventListener("hidden.bs.toast", function () {

        toast.remove();

    });

}

/******************************************************
 * GOOGLE APPS SCRIPT
 ******************************************************/
function callServer(functionName, ...params) {

    return new Promise((resolve, reject) => {

        showLoader();

        try {

            google.script.run

                .withSuccessHandler(function (result) {

                    hideLoader();

                    console.groupCollapsed(
                        "Apps Script : " + functionName
                    );

                    console.log("Function :", functionName);
                    console.log("Result   :", result);
                    console.log("Type     :", typeof result);

                    console.groupEnd();

                    if (result === null || result === undefined) {

                        reject({
                            success: false,
                            message:
                                functionName +
                                " returned NULL."
                        });

                        return;

                    }

                    resolve(result);

                })

                .withFailureHandler(function (error) {

                    hideLoader();

                    console.error(error);

                    showToast(
                        error.message ||
                        "Server Error",
                        "danger"
                    );

                    reject(error);

                })

                [functionName](...params);

        }
        catch (e) {

            hideLoader();

            console.error(e);

            reject(e);

        }

    });

}

/******************************************************
 * COMMON UTILITIES
 ******************************************************/
function setText(id, value) {

    const element =
        document.getElementById(id);

    if (element) {

        element.textContent =
            value ?? "";

    }

}

function safeValue(id) {

    const element =
        document.getElementById(id);

    if (!element)
        return "";

    return element.value.trim();

}

function safeNumber(id) {

    const value =
        Number(
            document.getElementById(id)?.value
        );

    return isNaN(value)
        ? 0
        : value;

}

/******************************************************
 * LOAD USER SESSION
 ******************************************************/
async function loadSession() {

        const session =

            showToast(

            );

/******************************************************
 * PAGE NAVIGATION
 ******************************************************/
function showPage(pageId) {

    document
        .querySelectorAll(".app-page")
        .forEach(function (page) {

            page.style.display = "none";

        });

    const page =
        document.getElementById(pageId);

    if (page) {

        page.style.display = "block";

    }

}

/******************************************************
 * DASHBOARD
 ******************************************************/
function showDashboard() {

    showPage("dashboardPage");

}

/******************************************************
 * BOOKINGS
 ******************************************************/
function showBookings() {

    loadBookings();

}

/******************************************************
 * BOOKING MODAL
 ******************************************************/
let bookingModal = null;
let currentBookingId = null;
let isViewMode = false;

function openBookingForm() {

    const modal =
        document.getElementById(
            "bookingModal"
        );

    if (!modal) {

        showToast(
            "Booking form not found.",
            "danger"
        );

        return;

    }

    bookingModal =
        bootstrap.Modal.getOrCreateInstance(
            modal
        );

    clearBookingForm();

    currentBookingId = null;
    isViewMode = false;

    enableFormFields();

    document.querySelector("#bookingModal .modal-title").innerHTML =
        '<i class="bi bi-calendar-plus me-2"></i>New Booking';

    bookingModal.show();

}

function closeBookingForm() {

    if (bookingModal) {

        bookingModal.hide();

    }

    currentBookingId = null;
    isViewMode = false;

    enableFormFields();

}

function disableFormFields() {

    [
        "customerName",
        "mobile",
        "alternateMobile",
        "eventType",
        "eventDate",
        "eventTime",
        "venue",
        "requirement",
        "budget",
        "googleMap",
        "advanceAmount",
        "balanceAmount",
        "paymentStatus",
        "bookingStatus",
        "remarks"
    ].forEach(function (id) {

        const el = document.getElementById(id);

        if (el) {
            el.disabled = true;
        }

    });

    const saveBtn = document.getElementById("saveBookingBtn");
    const editBtn = document.getElementById("editFromViewBtn");

    if (saveBtn) {
        saveBtn.style.display = "none";
    }

    if (editBtn) {
        editBtn.style.display = "";
    }

}

function enableFormFields() {

    [
        "customerName",
        "mobile",
        "alternateMobile",
        "eventType",
        "eventDate",
        "eventTime",
        "venue",
        "requirement",
        "budget",
        "googleMap",
        "advanceAmount",
        "balanceAmount",
        "paymentStatus",
        "bookingStatus",
        "remarks"
    ].forEach(function (id) {

        const el = document.getElementById(id);

        if (el) {
            el.disabled = false;
        }

    });

    const saveBtn = document.getElementById("saveBookingBtn");
    const editBtn = document.getElementById("editFromViewBtn");

    if (saveBtn) {
        saveBtn.style.display = "";
    }

    if (editBtn) {
        editBtn.style.display = "none";
    }

}

/******************************************************
 * CLEAR BOOKING FORM
 ******************************************************/
function clearBookingForm() {

    [
        "customerName",
        "mobile",
        "alternateMobile",
        "eventDate",
        "eventTime",
        "venue",
        "requirement",
        "budget",
        "googleMap",
        "advanceAmount",
        "balanceAmount",
        "remarks"
    ].forEach(function (id) {

        const el =
            document.getElementById(id);

        if (el) {

            el.value = "";

        }

    });

    [
        "eventType",
        "paymentStatus",
        "bookingStatus"
    ].forEach(function (id) {

        const el =
            document.getElementById(id);

        if (el) {

            el.selectedIndex = 0;

        }

    });

    const statusBadge = document.getElementById("customerStatus");
    const historyDiv = document.getElementById("customerHistory");

    if (statusBadge) {
        statusBadge.style.display = "none";
    }

    if (historyDiv) {
        historyDiv.style.display = "none";
    }

}

/******************************************************
 * POPULATE BOOKING FORM
 ******************************************************/
function populateBookingForm(booking) {

    document.getElementById("customerName").value =
        booking.CustomerName || "";

    document.getElementById("mobile").value =
        booking.Mobile || "";

    document.getElementById("alternateMobile").value =
        booking.AlternateMobile || "";

    document.getElementById("eventType").value =
        booking.EventType || "Wedding";

    document.getElementById("eventDate").value =
        booking.EventDate || "";

    document.getElementById("eventTime").value =
        booking.EventTime || "";

    document.getElementById("venue").value =
        booking.Venue || "";

    document.getElementById("requirement").value =
        booking.Requirement || "";

    document.getElementById("budget").value =
        booking.Budget || 0;

    document.getElementById("googleMap").value =
        booking.GoogleMap || "";

    document.getElementById("advanceAmount").value =
        booking.AdvanceAmount || 0;

    document.getElementById("balanceAmount").value =
        booking.BalanceAmount || 0;

    document.getElementById("paymentStatus").value =
        booking.PaymentStatus || "Pending";

    document.getElementById("bookingStatus").value =
        booking.BookingStatus || "New";

    document.getElementById("remarks").value =
        booking.Remarks || "";

}

/******************************************************
 * CALCULATE BALANCE
 ******************************************************/
function calculateBalance() {

    const budget =
        safeNumber("budget");

    const advance =
        safeNumber("advanceAmount");

    document.getElementById(
        "balanceAmount"
    ).value = budget - advance;

}

/******************************************************
 * CUSTOMER AUTO LOOKUP
 ******************************************************/
let lookupTimeout = null;

function handleMobilePaste(event) {
    event.preventDefault();
    const paste = (event.clipboardData || window.clipboardData).getData('text');
    const digitsOnly = paste.replace(/[^0-9]/g, '');
    
    if (paste !== digitsOnly) {
        showToast("Only digits allowed in mobile number", "warning");
    }
    
    const limited = digitsOnly.substring(0, 10);
    document.getElementById('mobile').value = limited;
    handleMobileInput();
}

let lastMobileValue = "";

function validateMobileInput(event) {
    const input = event.target;
    const beforeValue = lastMobileValue;
    const afterValue = input.value;
    
    if (afterValue.length > beforeValue.length) {
        const newChars = afterValue.substring(beforeValue.length);
        if (/[^0-9]/.test(newChars)) {
            showToast("Only numbers (0-9) allowed", "warning");
        }
    }
    
    lastMobileValue = afterValue;
}

function handleMobileInput() {

    const mobile = safeValue("mobile");

    console.log("=== MOBILE INPUT ===");
    console.log("Mobile entered:", mobile);
    console.log("Length:", mobile.length);

    validateMobileInput({ target: document.getElementById("mobile") });

    clearTimeout(lookupTimeout);

    const statusBadge = document.getElementById("customerStatus");
    const historyDiv = document.getElementById("customerHistory");

    if (mobile.length !== 10) {
        console.log("Mobile length not 10, hiding status");
        if (statusBadge) {
            statusBadge.style.display = "none";
        }
        if (historyDiv) {
            historyDiv.style.display = "none";
        }
        return;
    }

    console.log("Mobile is 10 digits, triggering lookup in 500ms...");

    if (statusBadge) {
        statusBadge.className = "badge bg-secondary mt-2";
        statusBadge.textContent = "🔍 Searching...";
        statusBadge.style.display = "inline-block";
    }

    lookupTimeout = setTimeout(async function() {
        console.log("Timeout executed, calling searchCustomer()");
        await searchCustomer(mobile);
    }, 500);

}

async function searchCustomer(mobile) {

    console.log("=== SEARCH CUSTOMER ===");
    console.log("Calling backend with mobile:", mobile);

    const statusBadge = document.getElementById("customerStatus");
    const historyDiv = document.getElementById("customerHistory");

    try {

        const result = await callServer(
            "searchCustomerByMobile",
            mobile
        );

        console.log("Backend response received:");
        console.log("Success:", result.success);
        console.log("Message:", result.message);
        console.log("Data:", result.data);

        if (!result) {
            console.error("No result returned");
            showToast("Customer lookup failed - no response", "danger");
            if (statusBadge) statusBadge.style.display = "none";
            return;
        }

        if (!result.success) {
            console.error("Search failed:", result.message);
            showToast("Customer lookup failed: " + result.message, "danger");
            if (statusBadge) statusBadge.style.display = "none";
            return;
        }

        if (!result.data) {
            console.error("No data in result");
            showToast("Customer lookup failed - no data", "danger");
            if (statusBadge) statusBadge.style.display = "none";
            return;
        }

        console.log("Is New Customer:", result.data.isNew);
        console.log("Exists:", result.data.exists);

        if (result.data.isNew) {

            console.log("=== NEW CUSTOMER PATH ===");

            if (statusBadge) {
                statusBadge.className = "badge bg-primary mt-2";
                statusBadge.textContent = "🔵 New Customer";
                statusBadge.style.display = "inline-block";
                console.log("Badge set to: New Customer");
            }

            if (historyDiv) {
                historyDiv.style.display = "none";
            }

            clearCustomerFields();

        } else {

            console.log("=== EXISTING CUSTOMER PATH ===");
            console.log("Customer data:", result.data.customer);
            console.log("History data:", result.data.history);

            if (!result.data.customer) {
                console.error("Customer data missing!");
                showToast("Customer data incomplete", "warning");
                return;
            }

            if (statusBadge) {
                statusBadge.className = "badge bg-success mt-2";
                statusBadge.textContent = "🟢 Existing Customer";
                statusBadge.style.display = "inline-block";
                console.log("Badge set to: Existing Customer");
            }

            showToast("Customer found: " + result.data.customer.CustomerName, "success");

            populateCustomerData(result.data.customer);

            if (historyDiv && result.data.history) {
                displayCustomerHistory(result.data.history);
                historyDiv.style.display = "block";
                console.log("History displayed");
            }

        }

    } catch (e) {
        console.error("=== ERROR IN SEARCH ===");
        console.error(e);
        showToast("Error searching customer: " + (e.message || "Unknown error"), "danger");
        if (statusBadge) statusBadge.style.display = "none";
    }

}

function populateCustomerData(customer) {

    console.log("=== POPULATE CUSTOMER DATA ===");
    console.log("Customer object:", customer);

    const nameField = document.getElementById("customerName");
    const altMobileField = document.getElementById("alternateMobile");

    if (nameField) {
        nameField.value = customer.CustomerName || "";
        console.log("Set customerName to:", customer.CustomerName);
    } else {
        console.error("customerName field not found!");
    }

    if (altMobileField) {
        altMobileField.value = customer.AlternateMobile || "";
        console.log("Set alternateMobile to:", customer.AlternateMobile);
    } else {
        console.error("alternateMobile field not found!");
    }

}

function clearCustomerFields() {

    console.log("=== CLEAR CUSTOMER FIELDS ===");

    const nameField = document.getElementById("customerName");
    const altMobileField = document.getElementById("alternateMobile");

    if (nameField) {
        nameField.value = "";
        console.log("Cleared customerName");
    }

    if (altMobileField) {
        altMobileField.value = "";
        console.log("Cleared alternateMobile");
    }

}

function displayCustomerHistory(history) {

    console.log("=== DISPLAY CUSTOMER HISTORY ===");
    console.log("History object:", history);

    setText("customerSince", history.customerSince || "-");
    setText("totalBookings", history.totalBookings || "0");
    setText("lastEventDate", history.lastEventDate || "-");
    setText("previousEvents", history.eventTypes || "-");

    console.log("History displayed successfully");

}
/******************************************************
 * SAVE BOOKING
 ******************************************************/
async function saveBooking() {

    const booking = {

        customerName: safeValue("customerName"),
        mobile: safeValue("mobile"),
        alternateMobile: safeValue("alternateMobile"),

        eventType:
            document.getElementById("eventType").value,

        eventDate:
            document.getElementById("eventDate").value,

        eventTime:
            document.getElementById("eventTime").value,

        venue: safeValue("venue"),
        requirement: safeValue("requirement"),
        budget: safeNumber("budget"),
        googleMap: safeValue("googleMap"),

        advanceAmount:
            safeNumber("advanceAmount"),

        balanceAmount:
            safeNumber("balanceAmount"),

        paymentStatus:
            document.getElementById("paymentStatus").value,

        bookingStatus:
            document.getElementById("bookingStatus").value,

        remarks: safeValue("remarks")

    };

    if (!booking.customerName)
        return showToast("Customer Name is required", "danger");

    if (!booking.mobile)
        return showToast("Mobile Number is required", "danger");

    if (!booking.eventType)
        return showToast("Event Type is required", "danger");

    if (!booking.eventDate)
        return showToast("Event Date is required", "danger");

    try {

        let result;

        if (currentBookingId) {

            booking.bookingId = currentBookingId;

            result = await callServer(
                "updateBooking",
                booking
            );

        } else {

            result = await callServer(
                "saveBooking",
                booking
            );

        }

        if (!result.success) {

            showToast(
                result.message,
                "danger"
            );

            return;

        }

        showToast(result.message);

        if (bookingModal) {

            bookingModal.hide();

        }

        currentBookingId = null;

        await loadBookings();

        await loadDashboard();

    }
    catch (e) {

        console.error(e);

        showToast(
            e.message || "Unable to save booking.",
            "danger"
        );

    }

}

/******************************************************
 * LOAD BOOKINGS
 ******************************************************/
async function loadBookings() {

    try {

        const result =
            await callServer(
                "getBookingList"
            );

        console.log("Booking Response :", result);

        if (!result) {

            showToast(
                "No response from server.",
                "danger"
            );

            return;

        }

        if (!result.success) {

            showToast(
                result.message,
                "danger"
            );

            return;

        }

        renderBookingTable(
            result.data || []
        );

    }
    catch (e) {

        console.error(e);

        showToast(
            e.message || "Unable to load bookings.",
            "danger"
        );

    }

}

/******************************************************
 * RENDER BOOKING TABLE
 ******************************************************/
function renderBookingTable(bookings) {

    const tbody =
        document.getElementById("bookingTable");

    if (!tbody)
        return;

    tbody.innerHTML = "";

    if (!bookings || !Array.isArray(bookings) || !bookings.length) {

        tbody.innerHTML = `
        <tr>
            <td colspan="10"
                class="text-center text-muted">
                No Bookings Available
            </td>
        </tr>`;

        setText("bookingCount", "Total Bookings : 0");

        return;

    }

    bookings.forEach(function(item){

        tbody.innerHTML += `
        <tr>

            <td>${item.BookingNo || ""}</td>

            <td>${item.CustomerName || ""}</td>

            <td>${item.Mobile || ""}</td>

            <td>${item.EventType || ""}</td>

            <td>${item.EventDate || ""}</td>

            <td>₹ ${item.Budget || 0}</td>

            <td>₹ ${item.AdvanceAmount || 0}</td>

            <td>₹ ${item.BalanceAmount || 0}</td>

            <td>${item.BookingStatus || ""}</td>

            <td>

                <button
                    class="btn btn-sm btn-info"
                    onclick="viewBooking('${item.BookingID}')">

                    <i class="bi bi-eye"></i>

                </button>

                <button
                    class="btn btn-sm btn-primary"
                    onclick="editBooking('${item.BookingID}')">

                    <i class="bi bi-pencil"></i>

                </button>

                <button
                    class="btn btn-sm btn-danger"
                    onclick="deleteBooking('${item.BookingID}')">

                    <i class="bi bi-trash"></i>

                </button>

            </td>

        </tr>`;

    });

    setText("bookingCount", "Total Bookings : " + bookings.length);

}

/******************************************************
 * SEARCH BOOKINGS
 ******************************************************/
function searchBookings() {

    const search =
        document.getElementById("bookingSearch");

    if (!search)
        return;

    const keyword =
        search.value
            .toLowerCase()
            .trim();

    document
        .querySelectorAll("#bookingTable tr")
        .forEach(function (row) {

            row.style.display =
                row.innerText
                    .toLowerCase()
                    .includes(keyword)
                    ? ""
                    : "none";

        });

}

/******************************************************
 * EDIT BOOKING
 ******************************************************/
async function editBooking(id) {

    try {

        const result =
            await callServer(
                "getBookingById",
                id
            );

        if (!result.success) {

            showToast(
                result.message,
                "danger"
            );

            return;

        }

        const modal =
            document.getElementById("bookingModal");

        if (!modal) {

            showToast(
                "Booking form not found.",
                "danger"
            );

            return;

        }

        bookingModal =
            bootstrap.Modal.getOrCreateInstance(modal);

        clearBookingForm();

        populateBookingForm(result.data);

        currentBookingId = id;
        isViewMode = false;

        enableFormFields();

        document.querySelector("#bookingModal .modal-title").innerHTML =
            '<i class="bi bi-pencil-square me-2"></i>Edit Booking';

        bookingModal.show();

    }
    catch (e) {

        console.error(e);

        showToast(
            e.message || "Unable to load booking.",
            "danger"
        );

    }

}

/******************************************************
 * VIEW BOOKING
 ******************************************************/
async function viewBooking(id) {

    try {

        const result =
            await callServer(
                "getBookingById",
                id
            );

        if (!result.success) {

            showToast(
                result.message,
                "danger"
            );

            return;

        }

        const modal =
            document.getElementById("bookingModal");

        if (!modal) {

            showToast(
                "Booking form not found.",
                "danger"
            );

            return;

        }

        bookingModal =
            bootstrap.Modal.getOrCreateInstance(modal);

        clearBookingForm();

        populateBookingForm(result.data);

        currentBookingId = id;
        isViewMode = true;

        disableFormFields();

        document.querySelector("#bookingModal .modal-title").innerHTML =
            '<i class="bi bi-eye me-2"></i>View Booking';

        bookingModal.show();

    }
    catch (e) {

        console.error(e);

        showToast(
            e.message || "Unable to load booking.",
            "danger"
        );

    }

}

/******************************************************
 * SWITCH TO EDIT MODE FROM VIEW
 ******************************************************/
function switchToEditMode() {

    if (!currentBookingId) {
        return;
    }

    isViewMode = false;

    enableFormFields();

    document.querySelector("#bookingModal .modal-title").innerHTML =
        '<i class="bi bi-pencil-square me-2"></i>Edit Booking';

}

/******************************************************
 * DELETE BOOKING
 ******************************************************/
async function deleteBooking(id) {

    if (!confirm("Are you sure you want to delete this booking?")) {

        return;

    }

    try {

        const result =
            await callServer(
                "deleteBooking",
                id
            );

        if (!result.success) {

            showToast(
                result.message,
                "danger"
            );

            return;

        }

        showToast(result.message);

        await loadBookings();

        await loadDashboard();

    }
    catch (e) {

        console.error(e);

        showToast(
            e.message || "Unable to delete booking.",
            "danger"
        );

    }

}

/******************************************************
 * SIDEBAR ACTIVE MENU
 ******************************************************/
document.addEventListener("click", function (e) {

    const menu =
        e.target.closest(".menu-link");

    if (!menu)
        return;

    document
        .querySelectorAll(".menu-link")
        .forEach(function (link) {

            link.classList.remove("active");

        });

    menu.classList.add("active");

});

/******************************************************
 * APPLICATION STARTUP
 ******************************************************/
window.onload = async function () {

    console.log("RK EVENTS ERP v2.1 Started");

    try {

        await loadSession();

        await loadDashboard();

        showDashboard();

    }
    catch (e) {

        console.error(e);

        showToast(
            "Application startup failed.",
            "danger"
        );

    }

};
