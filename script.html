/******************************************************
 * TOAST
 ******************************************************/
function showToast(message, type = "success") {

    const container = document.getElementById("toastContainer");

    if (!container) return;

    const toast = document.createElement("div");

    toast.className =
        "toast align-items-center text-bg-" +
        type +
        " border-0";

    toast.innerHTML = `
        <div class="d-flex">

            <div class="toast-body">

                ${message}

            </div>

            <button
                type="button"
                class="btn-close btn-close-white me-2 m-auto"
                data-bs-dismiss="toast">
            </button>

        </div>
    `;

    container.appendChild(toast);

    const bsToast = new bootstrap.Toast(toast, {
        delay: 3000
    });

    bsToast.show();

    toast.addEventListener("hidden.bs.toast", function () {

        toast.remove();

    });

}

/******************************************************
 * GOOGLE APPS SCRIPT
 ******************************************************/
function callServer(functionName, ...params) {

    return new Promise((resolve, reject) => {

        showLoader();

        try {

            google.script.run

                .withSuccessHandler(function (result) {

                    hideLoader();

                    console.groupCollapsed(
                        "Apps Script : " + functionName
                    );

                    console.log("Function :", functionName);
                    console.log("Result   :", result);
                    console.log("Type     :", typeof result);

                    console.groupEnd();

                    if (result === null || result === undefined) {

                        reject({
                            success: false,
                            message:
                                functionName +
                                " returned NULL."
                        });

                        return;

                    }

                    resolve(result);

                })

                .withFailureHandler(function (error) {

                    hideLoader();

                    console.error(error);

                    showToast(
                        error.message ||
                        "Server Error",
                        "danger"
                    );

                    reject(error);

                })

                [functionName](...params);

        }
        catch (e) {

            hideLoader();

            console.error(e);

            reject(e);

        }

    });

}

/******************************************************
 * COMMON UTILITIES
 ******************************************************/
function setText(id, value) {

    const element =
        document.getElementById(id);

    if (element) {

        element.textContent =
            value ?? "";

    }

}

function safeValue(id) {

    const element =
        document.getElementById(id);

    if (!element)
        return "";

    return element.value.trim();

}

function safeNumber(id) {

    const value =
        Number(
            document.getElementById(id)?.value
        );

    return isNaN(value)
        ? 0
        : value;

}

/******************************************************
 * RECALCULATE PAYMENT SUMMARY
 ******************************************************/
function recalculatePaymentSummary() {
    const bookingAmount = Number(document.getElementById("bookingAmountEdit").value || 0);
    const advanceAmount = Number(document.getElementById("advanceAmountDisplay").value || 0);
    
    const alreadyReceived = advanceAmount;
    
    const outstanding = Math.max(0, bookingAmount - alreadyReceived);
    
    let paymentStatus = "Pending";
    if (alreadyReceived === 0) {
        paymentStatus = "Pending";
    } else if (alreadyReceived > 0 && alreadyReceived < bookingAmount) {
        paymentStatus = "Partial";
    } else if (alreadyReceived >= bookingAmount) {
        paymentStatus = "Paid";
    }
    
    document.getElementById("alreadyReceivedDisplay").value = alreadyReceived;
    document.getElementById("balanceAmount").value = outstanding;
    document.getElementById("paymentStatus").value = paymentStatus;
    
    document.getElementById("budget").value = bookingAmount;
    
    const advanceHidden = document.getElementById("advanceAmount");
    if (advanceHidden) {
        advanceHidden.value = alreadyReceived;
    }
}

/******************************************************
 * CALCULATE BOOKING STATUS (Business Rules)
 ******************************************************/
function calculateBookingStatus(eventDate, amountReceived, currentBookingStatus) {

    if (currentBookingStatus === "Cancelled") {
        return "Cancelled";
    }

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    const eventDateObj = eventDate ? new Date(eventDate) : null;
    if (eventDateObj) {
        eventDateObj.setHours(0, 0, 0, 0);
        if (today > eventDateObj) {
            return "Completed";
        }
    }

    if (amountReceived > 0) {
        return "Confirmed";
    }

    return "Pending";

}

/******************************************************
 * RECALCULATE STATUSES (Business Rules)
 ******************************************************/
function recalculateStatuses(budget, amountReceived, currentPaymentStatus, currentBookingStatus, eventDate) {

    const balance = budget - amountReceived;
    
    let paymentStatus = currentPaymentStatus;

    if (currentPaymentStatus !== "Refunded") {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const eventDateObj = eventDate ? new Date(eventDate) : null;
        if (eventDateObj) {
            eventDateObj.setHours(0, 0, 0, 0);
        }
        
        const eventPassed = eventDateObj && today > eventDateObj;

        if (amountReceived === 0) {
            paymentStatus = "Pending";
        } else if (amountReceived > 0 && balance > 0) {
            paymentStatus = eventPassed ? "Pending" : "Partial";
        } else if (balance === 0 && budget > 0) {
            paymentStatus = "Paid";
        }
    }

    const bookingStatus = calculateBookingStatus(eventDate, amountReceived, currentBookingStatus);

    return {
        paymentStatus: paymentStatus,
        bookingStatus: bookingStatus,
        balance: balance
    };

}

/******************************************************
 * APPLY BUSINESS RULES TO BOOKING OBJECT
 ******************************************************/
function applyBusinessRules(booking) {

    if (!booking) return booking;

    const budget = Number(booking.Budget || 0);
    const amountReceived = Number(booking.AdvanceAmount || 0);
    const currentPaymentStatus = booking.PaymentStatus || "Pending";
    const currentBookingStatus = booking.BookingStatus || "Pending";
    const eventDate = booking.EventDate || null;

    const result = recalculateStatuses(
        budget,
        amountReceived,
        currentPaymentStatus,
        currentBookingStatus,
        eventDate
    );

    booking.PaymentStatus = result.paymentStatus;
    booking.BookingStatus = result.bookingStatus;
    booking.BalanceAmount = result.balance;

    return booking;

}

/******************************************************
 * CALCULATE BALANCE
 ******************************************************/
function calculateBalance() {

    const budget = safeNumber("budget");
    
    let amountReceived;
    const initialAdvanceField = document.getElementById("initialAdvanceAmount");
    if (initialAdvanceField && initialAdvanceField.offsetParent !== null) {
        amountReceived = safeNumber("initialAdvanceAmount");
    } else {
        amountReceived = safeNumber("advanceAmount");
    }
    
    const eventDate = document.getElementById("eventDate").value;

    const paymentStatusEl = document.getElementById("paymentStatus");
    const bookingStatusEl = document.getElementById("bookingStatus");

    const result = recalculateStatuses(
        budget,
        amountReceived,
        paymentStatusEl.value,
        bookingStatusEl.value,
        eventDate
    );

    document.getElementById("balanceAmount").value = result.balance;
    paymentStatusEl.value = result.paymentStatus;
    bookingStatusEl.value = result.bookingStatus;

}

/******************************************************
 * HANDLE PAYMENT STATUS CHANGE
 ******************************************************/
function handlePaymentStatusChange() {

    const paymentStatus = document.getElementById("paymentStatus").value;
    const budget = safeNumber("budget");

    if (paymentStatus === "Paid" && budget > 0) {
        document.getElementById("advanceAmount").value = budget;
        document.getElementById("balanceAmount").value = 0;
    }

    if (paymentStatus === "Refunded") {
        document.getElementById("bookingStatus").value = "Cancelled";
    } else {
        calculateBalance();
    }

}

/******************************************************

 ******************************************************/
let lookupTimeout = null;

function handleMobilePaste(event) {
    event.preventDefault();
    const paste = (event.clipboardData || window.clipboardData).getData('text');
    const digitsOnly = paste.replace(/[^0-9]/g, '');
    
    if (paste !== digitsOnly) {
        showToast("Only digits allowed in mobile number", "warning");
    }
    
    const limited = digitsOnly.substring(0, 10);
    document.getElementById('mobile').value = limited;
    handleMobileInput();
}

let lastMobileValue = "";

function validateMobileInput(event) {
    const input = event.target;
    const beforeValue = lastMobileValue;
    const afterValue = input.value;
    
    if (afterValue.length > beforeValue.length) {
        const newChars = afterValue.substring(beforeValue.length);
        if (/[^0-9]/.test(newChars)) {
            showToast("Only numbers (0-9) allowed", "warning");
        }
    }
    
    lastMobileValue = afterValue;
}

function handleMobileInput() {

    const mobile = safeValue("mobile");

    console.log("=== MOBILE INPUT ===");
    console.log("Mobile entered:", mobile);
    console.log("Length:", mobile.length);

    validateMobileInput({ target: document.getElementById("mobile") });

    clearTimeout(lookupTimeout);

    const statusBadge = document.getElementById("customerStatus");
    const historyDiv = document.getElementById("customerHistory");

    if (mobile.length !== 10) {
        console.log("Mobile length not 10, hiding status");
        if (statusBadge) {
            statusBadge.style.display = "none";
        }
        if (historyDiv) {
            historyDiv.style.display = "none";
        }
        return;
    }

    console.log("Mobile is 10 digits, triggering lookup in 500ms...");

    if (statusBadge) {
        statusBadge.className = "badge bg-secondary mt-2";
        statusBadge.textContent = "🔍 Searching...";
        statusBadge.style.display = "inline-block";
    }

    lookupTimeout = setTimeout(async function() {
        console.log("Timeout executed, calling searchCustomer()");
        await searchCustomer(mobile);
    }, 500);

}

async function searchCustomer(mobile) {

    console.log("=== SEARCH CUSTOMER ===");
    console.log("Calling backend with mobile:", mobile);

    const statusBadge = document.getElementById("customerStatus");
    const historyDiv = document.getElementById("customerHistory");

    try {

        const result = await callServer(
            "searchCustomerByMobile",
            mobile
        );

        console.log("Backend response received:");
        console.log("Success:", result.success);
        console.log("Message:", result.message);
        console.log("Data:", result.data);

        if (!result) {
            console.error("No result returned");
            showToast("Customer lookup failed - no response", "danger");
            if (statusBadge) statusBadge.style.display = "none";
            return;
        }

        if (!result.success) {
            console.error("Search failed:", result.message);
            showToast("Customer lookup failed: " + result.message, "danger");
            if (statusBadge) statusBadge.style.display = "none";
            return;
        }

        if (!result.data) {
            console.error("No data in result");
            showToast("Customer lookup failed - no data", "danger");
            if (statusBadge) statusBadge.style.display = "none";
            return;
        }

        console.log("Is New Customer:", result.data.isNew);
        console.log("Exists:", result.data.exists);

        if (result.data.isNew) {

            console.log("=== NEW CUSTOMER PATH ===");

            if (statusBadge) {
                statusBadge.className = "badge bg-primary mt-2";
                statusBadge.textContent = "🔵 New Customer";
                statusBadge.style.display = "inline-block";
                console.log("Badge set to: New Customer");
            }

            if (historyDiv) {
                historyDiv.style.display = "none";
            }

            clearCustomerFields();
            
            // Enable customer name field for new customers
            const customerNameField = document.getElementById("customerName");
            if (customerNameField) {
                customerNameField.removeAttribute("readonly");
                customerNameField.classList.remove("bg-light");
                customerNameField.style.cursor = "text";
            }

        } else {

            console.log("=== EXISTING CUSTOMER PATH ===");
            console.log("Customer data:", result.data.customer);
            console.log("History data:", result.data.history);

            if (!result.data.customer) {
                console.error("Customer data missing!");
                showToast("Customer data incomplete", "warning");
                return;
            }

            if (statusBadge) {
                statusBadge.className = "badge bg-success mt-2";
                statusBadge.textContent = "🟢 Existing Customer";
                statusBadge.style.display = "inline-block";
                console.log("Badge set to: Existing Customer");
            }

            showToast("Customer found: " + result.data.customer.CustomerName, "success");

            populateCustomerData(result.data.customer);

            if (historyDiv && result.data.history) {
                displayCustomerHistory(result.data.history);
                historyDiv.style.display = "block";
                console.log("History displayed");
            }

        }

    } catch (e) {
        console.error("=== ERROR IN SEARCH ===");
        console.error(e);
        showToast("Error searching customer: " + (e.message || "Unknown error"), "danger");
        if (statusBadge) statusBadge.style.display = "none";
    }

}

function populateCustomerData(customer) {

    console.log("=== POPULATE CUSTOMER DATA ===");
    console.log("Customer object:", customer);

    const fields = {
        customerName: customer.CustomerName || "",
        alternateMobile: customer.AlternateMobile || ""
    };

    for (var fieldId in fields) {
        const field = document.getElementById(fieldId);
        if (field) {
            field.value = fields[fieldId];
            console.log("Set " + fieldId + " to:", fields[fieldId]);
        } else {
            console.error(fieldId + " field not found!");
        }
    }
    
    // BUSINESS RULE: Customer name is readonly for existing customers
    // Customer Master is the ONLY source of truth
    const customerNameField = document.getElementById("customerName");
    if (customerNameField) {
        customerNameField.setAttribute("readonly", "readonly");
        customerNameField.classList.add("bg-light");
        customerNameField.style.cursor = "not-allowed";
        customerNameField.title = "Customer name cannot be changed here. Edit from Customer Management.";
    }

}

    console.log("=== CLEAR CUSTOMER FIELDS ===");

    const nameField = document.getElementById("customerName");
    const altMobileField = document.getElementById("alternateMobile");

    if (nameField) {
        nameField.value = "";
        console.log("Cleared customerName");
    }

    if (altMobileField) {
        altMobileField.value = "";
        console.log("Cleared alternateMobile");
    }

}

    const booking = {

        customerName: safeValue("customerName"),
        mobile: safeValue("mobile"),
        alternateMobile: safeValue("alternateMobile"),

        eventType:
            document.getElementById("eventType").value,

        eventDate:
            document.getElementById("eventDate").value,

        eventTime:
            document.getElementById("eventTime").value,

        venue: safeValue("venue"),
        requirement: safeValue("requirement"),
        budget: 0,
        bookingSource: document.getElementById("bookingSource").value,

        advanceAmount: 0,

        balanceAmount: 0,

        paymentStatus: "Pending",

        paymentDate:
            document.getElementById("paymentDate").value,

        paymentMode:
            document.getElementById("paymentMode").value,

        paymentRemarks:
            safeValue("paymentRemarks"),

        bookingStatus:
            document.getElementById("bookingStatus").value,

        remarks: safeValue("remarks")

    };

    if (!booking.customerName)
        return showToast("Customer Name is required", "danger");

    if (!booking.mobile)
        return showToast("Mobile Number is required", "danger");

    if (!booking.eventType)
        return showToast("Event Type is required", "danger");

    if (!booking.eventDate)
        return showToast("Event Date is required", "danger");
    
    if (!booking.bookingSource)
        return showToast("Booking Source is required", "danger");

    try {

        let result;

        if (currentBookingId) {

            const bookingAmountEdit = document.getElementById("bookingAmountEdit");
            const budgetValue = bookingAmountEdit ? Number(bookingAmountEdit.value || 0) : safeNumber("budget");
            
            if (budgetValue <= 0) {
                return showToast("Budget must be greater than zero", "danger");
            }
            
            booking.budget = budgetValue;
            booking.advanceAmount = Number(document.getElementById("advanceAmountDisplay").value || 0);
            booking.balanceAmount = Number(document.getElementById("balanceAmount").value || 0);
            booking.paymentStatus = document.getElementById("paymentStatus").value;
            booking.bookingId = currentBookingId;

            result = await callServer(
                "updateBooking",
                booking
            );

        } else {

            const budgetValue = safeNumber("budget");
            if (budgetValue <= 0) {
                return showToast("Booking Amount must be greater than zero", "danger");
            }
            
            const advanceAmount = Number(document.getElementById("newBookingAdvanceAmount").value);
            if (isNaN(advanceAmount) || advanceAmount < 0) {
                return showToast("Advance Amount cannot be negative", "danger");
            }
            
            if (advanceAmount > budgetValue) {
                return showToast("Advance Amount cannot exceed Booking Amount", "danger");
            }
            
            const paymentMode = document.getElementById("newBookingPaymentMode").value;
            if (!paymentMode) {
                return showToast("Payment Mode is required", "danger");
            }
            
            const paymentDate = document.getElementById("newBookingPaymentDate").value;
            if (!paymentDate) {
                return showToast("Payment Date is required", "danger");
            }
            
            const paymentRemarks = document.getElementById("newBookingPaymentRemarks").value;
            
            booking.budget = budgetValue;
            booking.advanceAmount = advanceAmount;
            booking.balanceAmount = Math.max(0, budgetValue - advanceAmount);
            
            if (advanceAmount === 0) {
                booking.paymentStatus = "Pending";
            } else if (advanceAmount < budgetValue) {
                booking.paymentStatus = "Partial";
            } else {
                booking.paymentStatus = "Paid";
            }
            
            booking.paymentMode = paymentMode;
            booking.paymentDate = paymentDate;
            booking.paymentRemarks = paymentRemarks;

            result = await callServer(
                "saveBooking",
                booking
            );

        }

        if (!result.success) {

            showToast(
                result.message,
                "danger"
            );

            return;

        }

        showToast(result.message);

        if (bookingModal) {

            bookingModal.hide();

        }

        currentBookingId = null;

        await loadBookings();

        await loadDashboard();

    }
    catch (e) {

        console.error(e);

        showToast(
            e.message || "Unable to save booking.",
            "danger"
        );

    }

}

/******************************************************
 * FILTER BY DATE RANGE
 ******************************************************/
function filterByDateRange(bookings) {
    if (!bookings || !Array.isArray(bookings)) {
        return [];
    }

    const fromDateNormalized = currentFromDate ? new Date(currentFromDate) : null;
    const toDateNormalized = currentToDate ? new Date(currentToDate) : null;

    if (fromDateNormalized) {
        fromDateNormalized.setHours(0, 0, 0, 0);
    }

    if (toDateNormalized) {
        toDateNormalized.setHours(23, 59, 59, 999);
    }

    const filtered = bookings.filter(function(booking) {
        if (!booking.EventDate) {
            return false;
        }

        const eventDate = parseDisplayDate(booking.EventDate);
        if (!eventDate) {
            console.warn('Failed to parse date:', booking.EventDate, 'for booking:', booking.BookingNo);
            return false;
        }

        eventDate.setHours(0, 0, 0, 0);

        if (fromDateNormalized && eventDate < fromDateNormalized) {
            return false;
        }

        if (toDateNormalized && eventDate > toDateNormalized) {
            return false;
        }

        return true;
    });

    return filtered;
}

/******************************************************
 * FILTER BY TEXT
 ******************************************************/
function filterByText(bookings, searchText) {
    if (!bookings || !Array.isArray(bookings)) {
        return [];
    }
    
    const searchLower = searchText.toLowerCase();
    
    return bookings.filter(function(booking) {
        const bookingNo = String(booking.BookingNo || '').toLowerCase();
        const customerName = String(booking.CustomerName || '').toLowerCase();
        const mobile = String(booking.Mobile || '').toLowerCase();
        const eventType = String(booking.EventType || '').toLowerCase();
        const venue = String(booking.Venue || '').toLowerCase();
        const bookingStatus = String(booking.BookingStatus || '').toLowerCase();
        const paymentStatus = String(booking.PaymentStatus || '').toLowerCase();
        const budget = String(booking.Budget || '').toLowerCase();
        const advanceAmount = String(booking.AdvanceAmount || '').toLowerCase();
        const balanceAmount = String(booking.BalanceAmount || '').toLowerCase();
        const bookingSource = String(booking.GoogleMap || '').toLowerCase(); // GoogleMap column stores BookingSource
        
        return bookingNo.includes(searchLower) ||
               customerName.includes(searchLower) ||
               mobile.includes(searchLower) ||
               eventType.includes(searchLower) ||
               venue.includes(searchLower) ||
               bookingStatus.includes(searchLower) ||
               paymentStatus.includes(searchLower) ||
               budget.includes(searchLower) ||
               advanceAmount.includes(searchLower) ||
               balanceAmount.includes(searchLower) ||
               bookingSource.includes(searchLower);
    });
}

function formatDateDisplay(date) {

    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                       'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

/******************************************************
 * GET CURRENT MONTH INFO
 ******************************************************/
function getCurrentMonthInfo() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                       'July', 'August', 'September', 'October', 'November', 'December'];
    
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    
    return {
        name: monthNames[month],
        year: year,
        firstDay: firstDay,
        lastDay: lastDay,
        displayName: monthNames[month] + ' ' + year
    };
}

/******************************************************
 * FILTER BOOKINGS BY CURRENT MONTH
 ******************************************************/
function filterBookingsByMonth(bookings) {
    if (!bookings || !Array.isArray(bookings)) {
        return [];
    }
    
    const monthInfo = getCurrentMonthInfo();
    const firstDayStr = formatDateForComparison(monthInfo.firstDay);
    const lastDayStr = formatDateForComparison(monthInfo.lastDay);
    
    return bookings.filter(function(booking) {
        if (!booking.EventDate) return false;
        
        const eventDateStr = formatDateForComparison(parseDisplayDate(booking.EventDate));
        
        return eventDateStr >= firstDayStr && eventDateStr <= lastDayStr;
    });
}

/******************************************************
 * FORMAT DATE FOR COMPARISON (YYYY-MM-DD)
 ******************************************************/
function formatDateForComparison(date) {
    if (!date || !(date instanceof Date)) return '';
    
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    
    return year + '-' + month + '-' + day;
}

/******************************************************
 * PARSE DATE (Universal - handles multiple formats)
 ******************************************************/
function parseDisplayDate(dateInput) {
    if (!dateInput) return null;
    
    // Already a Date object
    if (dateInput instanceof Date) {
        return new Date(dateInput);
    }
    
    // Number (timestamp or Google serial date)
    if (typeof dateInput === 'number') {
        return new Date(dateInput);
    }
    
    const dateStr = String(dateInput).trim();
    if (!dateStr) return null;
    
    // Try ISO format: YYYY-MM-DD or YYYY/MM/DD
    if (/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(dateStr)) {
        const parsed = new Date(dateStr);
        if (!isNaN(parsed.getTime())) {
            return parsed;
        }
    }
    
    // Try dd-MMM-yyyy format (e.g., 14-Jul-2026)
    const parts = dateStr.split('-');
    if (parts.length === 3) {
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                           'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        
        // Check if middle part is a month name
        const monthIndex = monthNames.indexOf(parts[1]);
        if (monthIndex !== -1) {
            const day = parseInt(parts[0]);
            const year = parseInt(parts[2]);
            
            if (!isNaN(day) && !isNaN(year)) {
                return new Date(year, monthIndex, day);
            }
        }
    }
    
    // Fallback: try native Date parsing
    const fallback = new Date(dateStr);
    if (!isNaN(fallback.getTime())) {
        return fallback;
    }
    
    console.warn('Unable to parse date:', dateInput);
    return null;
}

            ${booking.Requirement ? `
            <div class="preview-divider"></div>
            <div class="preview-row-full">
                <span class="preview-label">Requirements</span>
                <span class="preview-value">${booking.Requirement}</span>
            </div>` : ''}
            ${booking.Remarks ? `
            <div class="preview-row-full">
                <span class="preview-label">Remarks</span>
                <span class="preview-value">${booking.Remarks}</span>
            </div>` : ''}
        </div>
    `;
    
    document.body.appendChild(previewCard);
    
    previewCard.addEventListener('mouseenter', function() {
        clearTimeout(hideTimeout);
    });
    
    previewCard.addEventListener('mouseleave', function() {
        scheduleHidePreview();
    });
    
    positionPreviewCard(button, previewCard);
    
    currentPreview = previewCard;
    
    setTimeout(function() {
        previewCard.classList.add('visible');
    }, 10);
}

function positionPreviewCard(button, card) {
    const buttonRect = button.getBoundingClientRect();
    const cardWidth = 380;
    const cardHeight = card.offsetHeight;
    const viewportWidth = window.innerWidth;
    const viewportHeight = window.innerHeight;
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;
    
    let left = buttonRect.left + scrollLeft + (buttonRect.width / 2) - (cardWidth / 2);
    let top = buttonRect.bottom + scrollTop + 8;
    
    if (left + cardWidth > viewportWidth + scrollLeft - 20) {
        left = viewportWidth + scrollLeft - cardWidth - 20;
    }
    
    if (left < scrollLeft + 20) {
        left = scrollLeft + 20;
    }
    
    if (top + cardHeight > viewportHeight + scrollTop - 20) {
        top = buttonRect.top + scrollTop - cardHeight - 8;
    }
    
    card.style.left = left + 'px';
    card.style.top = top + 'px';
}

function hidePreviewCard() {
    if (currentPreview) {
        currentPreview.classList.remove('visible');
        setTimeout(function() {
            if (currentPreview && currentPreview.parentNode) {
                currentPreview.parentNode.removeChild(currentPreview);
            }
            currentPreview = null;
        }, 150);
    }
    clearTimeout(previewTimeout);
    clearTimeout(hideTimeout);
}

/**
 * Filter customers by type
 */
function filterCustomers(filterType) {
    
    currentCustomerFilter = filterType;
    
    // Update active filter button
    document.querySelectorAll('.btn-group .btn').forEach(function(btn) {
        btn.classList.remove('active');
    });
    
    event.target.classList.add('active');
    
    applyCustomerFilters();
    
}

/**
 * Apply all customer filters
 */
function applyCustomerFilters() {
    
    if (!customersLoaded && !customersLoading) {
        loadCustomers();
        return;
    }
    
    if (customersLoading) {
        return;
    }
    
    let filtered = allCustomersData || [];
    
    // Apply type filter
    const now = new Date();
    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
    
    filtered = filtered.filter(function(customer) {
        
        switch(currentCustomerFilter) {
            case 'active':
                return (customer.Status || 'Active').toLowerCase() === 'active';
                
            case 'inactive':
                return (customer.Status || '').toLowerCase() === 'inactive';
                
            case 'repeat':
                return customer.TotalBookings > 1;
                
            case 'newMonth':
                const since = customer.CustomerSince ? new Date(customer.CustomerSince) : null;
                return since && since >= startOfMonth;
                
            case 'upcoming':
                return customer.UpcomingEvents > 0;
                
            case 'pending':
                return customer.PendingAmount > 0;
                
            case 'all':
            default:
                return true;
        }
        
    });
    
    // Apply text search
    const searchInput = document.getElementById('customerSearch');
    const searchText = searchInput ? searchInput.value.trim() : '';
    
    if (searchText) {
        const searchLower = searchText.toLowerCase();
        filtered = filtered.filter(function(customer) {
            return String(customer.CustomerName || '').toLowerCase().includes(searchLower) ||
                   String(customer.Mobile || '').toLowerCase().includes(searchLower) ||
                   String(customer.CustomerID || '').toLowerCase().includes(searchLower) ||
                   String(customer.AlternateMobile || '').toLowerCase().includes(searchLower);
        });
    }
    
    // Apply sorting
    filtered = sortCustomerArray(filtered, currentCustomerSort.field, currentCustomerSort.order);
    
    // Update filter badge
    updateCustomerFilterBadge();
    
    // Render table
    renderCustomerTable(filtered);
    
}

/**
 * Sort customers
 */
function sortCustomers(field) {
    
    if (currentCustomerSort.field === field) {
        currentCustomerSort.order = currentCustomerSort.order === 'asc' ? 'desc' : 'asc';
    } else {
        currentCustomerSort.field = field;
        currentCustomerSort.order = 'asc';
    }
    
    applyCustomerFilters();
    
}

/**
 * Sort customer array
 */
function sortCustomerArray(customers, field, order) {
    
    return customers.sort(function(a, b) {
        
        let aVal, bVal;
        
        switch(field) {
            case 'name':
                aVal = (a.CustomerName || '').toLowerCase();
                bVal = (b.CustomerName || '').toLowerCase();
                break;
                
            case 'since':
                aVal = a.CustomerSince ? new Date(a.CustomerSince) : new Date(0);
                bVal = b.CustomerSince ? new Date(b.CustomerSince) : new Date(0);
                break;
                
            case 'bookings':
                aVal = a.TotalBookings || 0;
                bVal = b.TotalBookings || 0;
                break;
                
            case 'revenue':
                aVal = a.TotalRevenue || 0;
                bVal = b.TotalRevenue || 0;
                break;
                
            default:
                return 0;
        }
        
        if (order === 'asc') {
            return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
        } else {
            return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
        }
        
    });
    
}

    const badge = document.getElementById('activeCustomerFilter');

    };

    }
    
}

            bookingModalElement.style.zIndex = '1065';

            if (bookingBackdrop) {
                bookingBackdrop.style.zIndex = '1060';
            }
            bookingModalElement.removeEventListener('shown.bs.modal', adjustZIndex);

}

/**
 * Customer Bookings Drill-down
 */
let customerBookingsData = [];
let customerBookingsFilter = 'all';
let customerBookingsSortDir = 'desc';

function showCustomerBookings(customerId, customerName, filterType) {
    
    customerBookingsFilter = filterType;
    
    document.getElementById('customerBookingsModalLabel').textContent = customerName;
    
    const subtitles = {
        'all': 'Showing All Bookings',
        'upcoming': 'Showing Upcoming Bookings',
        'completed': 'Showing Completed Bookings'
    };
    document.getElementById('customerBookingsSubtitle').textContent = subtitles[filterType] || 'Showing All Bookings';
    
    document.getElementById('customerBookingsTableBody').innerHTML = 
        '<tr><td colspan="10" class="text-center text-muted py-4">Loading bookings...</td></tr>';
    
    const modal = new bootstrap.Modal(document.getElementById('customerBookingsModal'));
    modal.show();
    
    google.script.run
        .withSuccessHandler(function(response) {
            if (response.success && response.data) {
                customerBookingsData = (response.data || []).map(applyBusinessRules);
                renderCustomerBookings();
            } else {
                document.getElementById('customerBookingsTableBody').innerHTML = 
                    '<tr><td colspan="10" class="text-center text-danger py-4">Failed to load bookings</td></tr>';
            }
        })
        .withFailureHandler(function(error) {
            console.error('Error loading customer bookings:', error);
            document.getElementById('customerBookingsTableBody').innerHTML = 
                '<tr><td colspan="10" class="text-center text-danger py-4">Error: ' + error.message + '</td></tr>';
        })
        .getCustomerBookings(customerId);
    
}

function renderCustomerBookings() {
    
    let bookings = [...customerBookingsData].map(applyBusinessRules);
    
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    if (customerBookingsFilter === 'upcoming') {
        bookings = bookings.filter(b => {
            const eventDate = b.EventDate ? new Date(b.EventDate) : null;
            return eventDate && eventDate >= today;
        });
    } else if (customerBookingsFilter === 'completed') {
        bookings = bookings.filter(b => (b.BookingStatus || '').toLowerCase() === 'completed');
    }
    
    const searchText = (document.getElementById('customerBookingsSearch').value || '').toLowerCase();
    if (searchText) {
        bookings = bookings.filter(b => 
            (b.BookingID || '').toLowerCase().includes(searchText) ||
            (b.EventType || '').toLowerCase().includes(searchText) ||
            (b.Venue || '').toLowerCase().includes(searchText) ||
            (b.PaymentStatus || '').toLowerCase().includes(searchText) ||
            (b.BookingStatus || '').toLowerCase().includes(searchText)
        );
    }
    
    document.getElementById('customerBookingsCount').textContent = `Total: ${bookings.length} booking${bookings.length !== 1 ? 's' : ''}`;
    
    if (bookings.length === 0) {
        document.getElementById('customerBookingsTableBody').innerHTML = 
            '<tr><td colspan="10" class="text-center text-muted py-4">No bookings found</td></tr>';
        return;
    }
    
    let html = '';
    bookings.forEach(booking => {
        const balance = (booking.Budget || 0) - (booking.AdvanceAmount || 0);
        const paymentStatusClass = (booking.PaymentStatus || '').toLowerCase() === 'paid' ? 'bg-success' : 
                                   (booking.PaymentStatus || '').toLowerCase() === 'pending' ? 'bg-warning' : 'bg-secondary';
        const bookingStatusClass = (booking.BookingStatus || '').toLowerCase() === 'confirmed' ? 'bg-primary' : 
                                   (booking.BookingStatus || '').toLowerCase() === 'completed' ? 'bg-success' : 
                                   (booking.BookingStatus || '').toLowerCase() === 'cancelled' ? 'bg-danger' : 'bg-secondary';
        
        html += `
            <tr>
                <td><strong>${booking.BookingID || ''}</strong></td>
                <td>${booking.EventType || ''}</td>
                <td>${booking.EventDate || ''}</td>
                <td><small>${booking.Venue || ''}</small></td>
                <td class="text-end">₹ ${Number(booking.Budget || 0).toLocaleString()}</td>
                <td class="text-end">₹ ${Number(booking.AdvanceAmount || 0).toLocaleString()}</td>
                <td class="text-end ${balance > 0 ? 'text-danger' : ''}">₹ ${Number(balance).toLocaleString()}</td>
                <td><span class="badge ${paymentStatusClass}">${booking.PaymentStatus || 'Pending'}</span></td>
                <td><span class="badge ${bookingStatusClass}">${booking.BookingStatus || 'Pending'}</span></td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-info" onclick="viewBookingFromCustomerDrilldown('${booking.BookingID}')" title="View">
                        👁
                    </button>
                    <button class="btn btn-sm btn-outline-warning" onclick="editBookingFromCustomerDrilldown('${booking.BookingID}')" title="Edit">
                        ✏
                    </button>
                </td>
            </tr>
        `;
    });
    
    document.getElementById('customerBookingsTableBody').innerHTML = html;
    
}

function sortCustomerBookings(column) {
    
    if (column === 'eventDate') {
        customerBookingsSortDir = customerBookingsSortDir === 'asc' ? 'desc' : 'asc';
        
        customerBookingsData.sort((a, b) => {
            const dateA = a.EventDate ? new Date(a.EventDate) : new Date(0);
            const dateB = b.EventDate ? new Date(b.EventDate) : new Date(0);
            return customerBookingsSortDir === 'asc' ? dateA - dateB : dateB - dateA;
        });
        
        document.getElementById('sortIconEventDate').textContent = customerBookingsSortDir === 'asc' ? '↑' : '↓';
        
        renderCustomerBookings();
    }
    
}

function viewBookingFromCustomerDrilldown(bookingId) {
    
    viewBooking(bookingId);
    
    const bookingModalElement = document.getElementById('bookingModal');
    if (bookingModalElement) {
        bookingModalElement.addEventListener('shown.bs.modal', function adjustZIndex() {
            bookingModalElement.style.zIndex = '1075';
            const bookingBackdrop = document.querySelector('.modal-backdrop:last-of-type');
            if (bookingBackdrop) {
                bookingBackdrop.style.zIndex = '1070';
            }
            bookingModalElement.removeEventListener('shown.bs.modal', adjustZIndex);
        }, { once: true });
    }
    
}

function editBookingFromCustomerDrilldown(bookingId) {
    
    editBooking(bookingId);
    
    const bookingModalElement = document.getElementById('bookingModal');
    if (bookingModalElement) {
        bookingModalElement.addEventListener('shown.bs.modal', function adjustZIndex() {
            bookingModalElement.style.zIndex = '1075';
            const bookingBackdrop = document.querySelector('.modal-backdrop:last-of-type');
            if (bookingBackdrop) {
                bookingBackdrop.style.zIndex = '1070';
            }
            bookingModalElement.removeEventListener('shown.bs.modal', adjustZIndex);
        }, { once: true });
        
        bookingModalElement.addEventListener('hidden.bs.modal', function refreshAfterEdit() {
            
            loadCustomers();
            if (currentCustomerId) {
                google.script.run
                    .withSuccessHandler(function(response) {
                        if (response.success && response.data) {
                            const customerId = response.data.CustomerID;
                            const customerName = response.data.CustomerName;
                            showCustomerBookings(customerId, customerName, customerBookingsFilter);
                        }
                    })
                    .getCustomerById(currentCustomerId);
            }
            if (typeof loadBookings === 'function') {
                loadBookings();
            }
            
            bookingModalElement.removeEventListener('hidden.bs.modal', refreshAfterEdit);
        }, { once: true });
    }
    
}

document.getElementById('customerBookingsSearch')?.addEventListener('keyup', function() {
    renderCustomerBookings();
});

/**
 * Payment Ledger Functions
 */
async function loadPaymentHistory(bookingId) {
    
    try {
        
        const result = await callServer('getPaymentHistory', bookingId);
        
        if (result && result.success && result.data) {
            displayPaymentHistory(result.data);
        } else {
            document.getElementById('paymentHistoryTableBody').innerHTML = 
                '<tr><td colspan="6" class="text-center text-muted py-3">No payment history available</td></tr>';
        }
        
    } catch (e) {
        console.error('Error loading payment history:', e);
    }
    
}

function displayPaymentHistory(payments) {
    
    const tbody = document.getElementById('paymentHistoryTableBody');
    
    if (!payments || payments.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">No payment history available</td></tr>';
        return;
    }
    
    let html = '';
    
    payments.forEach(payment => {
        html += `
            <tr>
                <td>${payment.PaymentDate || '-'}</td>
                <td class="text-end"><strong>₹ ${Number(payment.Amount || 0).toLocaleString()}</strong></td>
                <td>${payment.PaymentMode || '-'}</td>
                <td><small>${payment.ReferenceNo || '-'}</small></td>
                <td><small>${payment.Remarks || '-'}</small></td>
                <td><small>${payment.CreatedBy || '-'}</small></td>
            </tr>
        `;
    });
    
    tbody.innerHTML = html;
    
}

async function addNewPayment() {
    
    try {
        
        const amount = document.getElementById('newPaymentAmount').value;
        const paymentDate = document.getElementById('newPaymentDate').value;
        const paymentMode = document.getElementById('newPaymentMode').value;
        const referenceNo = document.getElementById('newPaymentReference').value;
        const remarks = document.getElementById('newPaymentRemarks').value;
        
        if (!amount || Number(amount) <= 0) {
            showToast('Please enter a valid payment amount', 'warning');
            return;
        }
        
        if (!paymentDate) {
            showToast('Please select payment date', 'warning');
            return;
        }
        
        if (!paymentMode) {
            showToast('Please select payment mode', 'warning');
            return;
        }
        
        if (!currentBookingId) {
            showToast('Booking ID not found', 'danger');
            return;
        }
        
        const paymentData = {
            bookingId: currentBookingId,
            amount: Number(amount),
            paymentDate: paymentDate,
            paymentMode: paymentMode,
            referenceNo: referenceNo,
            remarks: remarks
        };
        
        const result = await callServer('addPayment', paymentData);
        
        if (result && result.success) {
            
            const paymentAmount = Number(amount);
            showToast('Payment of ₹' + paymentAmount.toLocaleString('en-IN') + ' added successfully', 'success');
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('newPaymentAmount').value = '';
            document.getElementById('newPaymentDate').value = today;
            document.getElementById('newPaymentMode').selectedIndex = 0;
            document.getElementById('newPaymentReference').value = '';
            document.getElementById('newPaymentRemarks').value = '';
            
            const budget = Number(document.getElementById('budget').value || 0);
            const totalPaid = Number(result.data.totalPaid || 0);
            const balance = Number(result.data.balance || 0);
            const eventDate = document.getElementById('eventDate').value;
            
            const bookingAmountDisplay = document.getElementById('bookingAmountDisplay');
            const advanceAmountDisplay = document.getElementById('advanceAmountDisplay');
            const balanceAmountDisplay = document.getElementById('balanceAmountDisplay');
            const paymentStatusDisplay = document.getElementById('paymentStatusDisplay');
            
            if (bookingAmountDisplay) {
                bookingAmountDisplay.textContent = '₹ ' + (isFinite(budget) ? budget : 0).toLocaleString('en-IN');
            }
            
            if (advanceAmountDisplay) {
                advanceAmountDisplay.textContent = '₹ ' + (isFinite(totalPaid) ? totalPaid : 0).toLocaleString('en-IN');
            }
            
            if (balanceAmountDisplay) {
                balanceAmountDisplay.textContent = '₹ ' + (isFinite(balance) ? balance : 0).toLocaleString('en-IN');
            }
            
            const statusResult = recalculateStatuses(budget, totalPaid, 'Pending', 'Pending', eventDate);
            
            if (paymentStatusDisplay) {
                paymentStatusDisplay.textContent = statusResult.paymentStatus;
            }
            
            await loadPaymentHistory(currentBookingId);
            
            if (typeof loadBookings === 'function') {
                loadBookings();
            }
            
            if (typeof loadCustomers === 'function') {
                loadCustomers();
            }
            
        } else {
            showToast(result.message || 'Failed to add payment', 'danger');
        }
        
    } catch (e) {
        console.error('Error adding payment:', e);
        showToast('Error adding payment: ' + e.message, 'danger');
    }
    
}

async function migrateOldBookingPayment(bookingId) {
    
    try {
        const result = await callServer('migrateBookingPayment', bookingId);
        return result && result.success;
    } catch (e) {
        console.error('Error migrating payment:', e);
        return false;
    }
    
}

function setupPaymentLedger() {
    
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('newPaymentDate').value = today;
    
    if (isViewMode) {
        document.getElementById('addPaymentSection').style.display = 'none';
        document.getElementById('paymentHistorySection').style.display = 'block';
    } else {
        document.getElementById('addPaymentSection').style.display = 'block';
        document.getElementById('paymentHistorySection').style.display = 'block';
    }
    
}
