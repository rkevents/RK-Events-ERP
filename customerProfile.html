<!-- Customer Profile Modal -->
<div class="modal fade" id="customerProfileModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            
            <div class="modal-header bg-gradient-primary text-white">
                <div>
                    <h5 class="modal-title mb-0">
                        <i class="bi bi-person-circle me-2"></i>
                        Customer Profile
                    </h5>
                    <small id="customerProfileId" class="opacity-75"></small>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                
                <!-- Customer Information Card -->
                <div class="card mb-3">
                    <div class="card-header bg-light">
                        <h6 class="mb-0"><i class="bi bi-person-badge me-2"></i>Customer Information</h6>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="small text-muted mb-1">Customer Name</label>
                                <div class="fw-bold" id="profileCustomerName">-</div>
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted mb-1">Mobile</label>
                                <div id="profileMobile">-</div>
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted mb-1">Alternate Mobile</label>
                                <div id="profileAlternateMobile">-</div>
                            </div>
                            <div class="col-md-6">
                                <label class="small text-muted mb-1">Email</label>
                                <div id="profileEmail">-</div>
                            </div>
                            <div class="col-md-6">
                                <label class="small text-muted mb-1">Address</label>
                                <div id="profileAddress">-</div>
                            </div>
                            <div class="col-md-6">
                                <label class="small text-muted mb-1">Customer Since</label>
                                <div id="profileCustomerSince">-</div>
                            </div>
                            <div class="col-md-6">
                                <label class="small text-muted mb-1">Status</label>
                                <div><span id="profileStatus" class="badge bg-success">Active</span></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Statistics Cards -->
                <div class="row g-3 mb-3">
                    <div class="col-lg-3 col-md-6">
                        <div class="card stat-card bg-primary text-white">
                            <div class="card-body">
                                <div class="small opacity-75">Total Bookings</div>
                                <h4 class="mb-0" id="statTotalBookings">0</h4>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-md-6">
                        <div class="card stat-card bg-success text-white">
                            <div class="card-body">
                                <div class="small opacity-75">Completed</div>
                                <h4 class="mb-0" id="statCompleted">0</h4>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-md-6">
                        <div class="card stat-card bg-info text-white">
                            <div class="card-body">
                                <div class="small opacity-75">Upcoming</div>
                                <h4 class="mb-0" id="statUpcoming">0</h4>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-md-6">
                        <div class="card stat-card bg-danger text-white">
                            <div class="card-body">
                                <div class="small opacity-75">Cancelled</div>
                                <h4 class="mb-0" id="statCancelled">0</h4>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Payment Summary -->
                <div class="card mb-3">
                    <div class="card-header bg-light">
                        <h6 class="mb-0"><i class="bi bi-cash-stack me-2"></i>Payment Summary</h6>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="small text-muted mb-1">Total Revenue</label>
                                <h5 class="mb-0 text-success" id="paymentTotalRevenue">₹ 0</h5>
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted mb-1">Amount Received</label>
                                <h5 class="mb-0 text-primary" id="paymentReceived">₹ 0</h5>
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted mb-1">Pending Amount</label>
                                <h5 class="mb-0 text-danger" id="paymentPending">₹ 0</h5>
                            </div>
                            <div class="col-md-3">
                                <label class="small text-muted mb-1">Avg Booking Value</label>
                                <h5 class="mb-0" id="paymentAverage">₹ 0</h5>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Booking History Timeline -->
                <div class="card">
                    <div class="card-header bg-light d-flex justify-content-between align-items-center">
                        <h6 class="mb-0"><i class="bi bi-clock-history me-2"></i>Booking History</h6>
                        <span class="badge bg-primary" id="historyCount">0 Bookings</span>
                    </div>
                    <div class="card-body">
                        <div id="bookingHistoryTimeline" class="timeline-container">
                            <div class="text-center text-muted py-4">
                                Loading booking history...
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="bi bi-x-circle me-1"></i> Close
                </button>
                <button type="button" class="btn btn-primary" onclick="editCustomerFromProfile()">
                    <i class="bi bi-pencil me-1"></i> Edit Customer
                </button>
                <button type="button" class="btn btn-success" onclick="newBookingFromCustomer()">
                    <i class="bi bi-plus-circle me-1"></i> New Booking
                </button>
            </div>

        </div>
    </div>
</div>

<!-- Edit Customer Modal -->
<div class="modal fade" id="editCustomerModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-pencil me-2"></i>
                    Edit Customer
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="editCustomerForm">
                    <input type="hidden" id="editCustomerId">

                    <div class="mb-3">
                        <label class="form-label">Customer ID</label>
                        <input type="text" class="form-control" id="editCustomerIdDisplay" disabled>
                        <small class="text-muted">Customer ID cannot be changed</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Customer Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="editCustomerName" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="text" class="form-control" id="editMobileDisplay" disabled>
                        <small class="text-muted">Primary mobile number cannot be changed</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Alternate Mobile</label>
                        <input type="text" class="form-control" id="editAlternateMobile" maxlength="10">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="editEmail">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" id="editAddress" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" id="editStatus">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveCustomerChanges()">
                    <i class="bi bi-check-circle me-1"></i> Save Changes
                </button>
            </div>

        </div>
    </div>
</div>
