<style>

:root{

    --sidebar-width:260px;

    --primary:#0d6efd;

    --sidebar:#1f2937;

    --sidebar-hover:#374151;

    --background:#f4f6f9;

    --card-radius:14px;

}

body{

    background:var(--background);

    font-family:Segoe UI,Tahoma,sans-serif;

    overflow-x:hidden;

}

/* Sidebar */

.sidebar{

    width:var(--sidebar-width);

    min-height:100vh;

    background:var(--sidebar);

    color:#fff;

    position:fixed;

    left:0;

    top:0;

    z-index:1000;

}

.sidebar .brand{

    font-size:22px;

    font-weight:bold;

    padding:20px;

    text-align:center;

    border-bottom:1px solid rgba(255,255,255,.1);

}

.sidebar a{

    color:#fff;

    text-decoration:none;

    display:block;

    padding:14px 20px;

    transition:.3s;

}

.sidebar a:hover{

    background:var(--sidebar-hover);

}

.sidebar a.active{

    background:var(--primary);

}

/* Main */

.main{

    margin-left:var(--sidebar-width);

}

/* Navbar */

.topbar{

    background:#fff;

    box-shadow:0 2px 10px rgba(0,0,0,.05);

    padding:15px 25px;

}

/* Cards */

.dashboard-card{

    border:none;

    border-radius:var(--card-radius);

    box-shadow:0 2px 8px rgba(0,0,0,.08);

    transition:.3s;

}

.dashboard-card:hover{

    transform:translateY(-3px);

}

/* Card Numbers */

.card-value{

    font-size:34px;

    font-weight:bold;

}

/* Loader */

.loader{

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100%;

    background:rgba(255,255,255,.6);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:9999;

    display:none;

}

/* Responsive */

@media(max-width:991px){

.sidebar{

    margin-left:-260px;

    transition:.3s;

}

.sidebar.show{

    margin-left:0;

}

.main{

    margin-left:0;

}

}

</style>
