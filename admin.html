<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK Events - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .admin-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .admin-header h1 {
            color: #1a202c;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .admin-header p {
            color: #718096;
            font-size: 14px;
        }
        
        .warning-box {
            background: #fff5f5;
            border: 2px solid #fc8181;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }
        
        .warning-box h3 {
            color: #c53030;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .warning-box p {
            color: #742a2a;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .reset-btn {
            width: 100%;
            padding: 16px;
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .reset-btn:hover {
            background: #c53030;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(229, 62, 62, 0.4);
        }
        
        .reset-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }
        
        .status-box {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        
        .status-box.success {
            background: #f0fff4;
            border: 2px solid #68d391;
            color: #22543d;
        }
        
        .status-box.error {
            background: #fff5f5;
            border: 2px solid #fc8181;
            color: #742a2a;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🔧 Admin Panel</h1>
            <p>RK Events ERP - Development Database</p>
        </div>
        
        <div class="warning-box">
            <h3>⚠️ Warning</h3>
            <p>This will permanently delete all bookings and customers from the development database. This action cannot be undone.</p>
        </div>
        
        <button class="reset-btn" id="resetBtn" onclick="resetDatabase()">
            🗑️ Reset Development Database
        </button>
        
        <div class="status-box" id="statusBox"></div>
    </div>
    
    <script>
        function resetDatabase() {
            const btn = document.getElementById('resetBtn');
            const statusBox = document.getElementById('statusBox');
            
            if (!confirm('Are you absolutely sure? This will delete ALL bookings and customers.')) {
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Resetting...';
            statusBox.style.display = 'none';
            
            google.script.run
                .withSuccessHandler(function(result) {
                    btn.disabled = false;
                    btn.innerHTML = '🗑️ Reset Development Database';
                    
                    if (result.success) {
                        statusBox.className = 'status-box success';
                        const data = result.data || {};
                        statusBox.innerHTML = '<strong>✅ Success!</strong><br>' +
                            'Deleted:<br>' +
                            '• Bookings: ' + (data.bookingsDeleted || 0) + '<br>' +
                            '• Customers: ' + (data.customersDeleted || 0);
                        statusBox.style.display = 'block';
                    } else {
                        statusBox.className = 'status-box error';
                        statusBox.innerHTML = '<strong>❌ Error</strong><br>' + result.message;
                        statusBox.style.display = 'block';
                    }
                })
                .withFailureHandler(function(error) {
                    btn.disabled = false;
                    btn.innerHTML = '🗑️ Reset Development Database';
                    
                    statusBox.className = 'status-box error';
                    statusBox.innerHTML = '<strong>❌ Error</strong><br>' + error.message;
                    statusBox.style.display = 'block';
                })
                .resetDevelopmentData();
        }
    </script>
</body>
</html>
